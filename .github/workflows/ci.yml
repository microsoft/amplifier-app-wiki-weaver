name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Lightweight, hermetic CI. wiki-weaver declares amplifier-foundation +
        # amplifier-unified-llm-client as @main git deps; we install with --no-deps so CI
        # does NOT git-clone those two repos on every run (slow + network-flaky). The real
        # `uv tool install` + @main resolution is validated by the DTU install proof, not CI.
        # Deterministic tests run here; tests needing the Amplifier runtime self-skip when
        # amplifier_foundation is absent.
        run: |
          python -m pip install --upgrade pip
          # Test runner + the lightweight PyPI runtime deps the deterministic
          # suite needs. tinycss2 + markdown are REAL runtime deps (dashboard
          # CSS sanitizer + markdown rendering); they must be present because
          # dashboard.py imports them at top level (no silent-degrade). hatchling
          # is a test-only dep: eval/test_hatch_build.py imports BuildHookInterface
          # to unit-test hatch_build.py's git-derived-version build hook (it is
          # already a [build-system] requirement, but that's only installed into
          # the isolated build env, not this test env). They are all installed
          # explicitly here because the package install below uses
          # --no-deps to avoid git-cloning the two @main Amplifier deps.
          pip install pytest pytest-asyncio pyyaml tinycss2 markdown hatchling
          pip install --no-deps -e .

      - name: Run eval tests
        # The deterministic tests (policy, provenance, ingest-drain, any-text ingest)
        # run without LLM calls or API keys and should always pass. Tests that invoke
        # the LLM pipeline (via amplifier_foundation) are automatically skipped when
        # that package is not installed — CI runs the deterministic majority.
        run: python -m pytest eval/ -q
